# Default configuration for HRNet-W18 + Jacquard V2 grasp segmentation.
# Tuned to fit a 6 GB consumer GPU (e.g. RTX 3060) with AMP + gradient
# accumulation. Override any field via CLI: e.g.
#   python tools/train.py --config configs/default.yaml dataset.image_size=320
seed: 0

dataset:
  root: /path/to/JacquardV2_Dataset       # directory containing JacquardV2_Dataset_{0..3}
  splits_path: splits/jacquard_v2.json    # generated by tools/prepare_split.py
  image_size: 384
  input_mode: rgbd                        # rgb | depth | rgbd
  mask_mode: angle                        # binary | angle | multitask
  num_angle_bins: 18                      # only used for mask_mode=angle
  length_scale: 0.3333                    # compact-polygon shrink (Jacquard default = 1/3)
  use_stereo_depth: false
  num_workers: 2
  pin_memory: true

augmentation:
  enable: true
  hflip_p: 0.5
  vflip_p: 0.5
  rotate_p: 0.8
  rotate_max_deg: 180.0
  scale_p: 0.7
  scale_range: [0.8, 1.2]
  translate_p: 0.5
  translate_max_frac: 0.05
  color_jitter_p: 0.5
  brightness: 0.2
  contrast: 0.2
  saturation: 0.2
  hue: 0.05
  rgb_noise_p: 0.3
  rgb_noise_std: 0.02
  depth_jitter_p: 0.5
  depth_jitter_range: [0.95, 1.05]
  depth_dropout_p: 0.3
  depth_dropout_frac: 0.02
  use_stereo_depth_p: 0.3                 # randomly swap perfect→stereo during training

model:
  backbone: hrnet_w18                     # hrnet_w18 | hrnet_w18_small_v2
  pretrained: true
  head_channels: 256
  dropout: 0.1

trainer:
  epochs: 80
  batch_size: 2
  accum_steps: 4                          # effective batch = batch_size * accum_steps = 8
  lr: 0.01
  weight_decay: 5.0e-4
  momentum: 0.9
  optimizer: sgd                          # sgd | adamw
  scheduler: poly                         # poly | cosine | none
  poly_power: 0.9
  warmup_epochs: 1.0
  grad_clip: 1.0
  log_interval: 20
  save_dir: outputs/run
  eval_every: 1
  amp: true
  save_every_epoch: true        # also write outputs/run/epoch_NNN.pth each epoch
  metrics_csv: metrics.csv      # appended every epoch under save_dir, set to "" to disable

loss:
  # binary
  bce_weight: 1.0
  dice_weight: 1.0
  bce_pos_weight: 5.0                     # area of positive pixels is small
  # angle (multi-class)
  ce_weight: 1.0                          # ce_weight + dice_weight reused for angle mode
  ignore_background_in_dice: true
  # multitask
  pos_weight: 1.0
  cos_weight: 1.0
  sin_weight: 1.0
  width_weight: 0.1
