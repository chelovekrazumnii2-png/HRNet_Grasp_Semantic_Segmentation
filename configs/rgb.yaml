# RGB-only configuration (3 input channels, no depth).
# Useful when the depth modality isn't available at inference time, or for
# ablating the contribution of the depth channel. Inherits the default
# HRNet-W18 + angle-segmentation setup; only the input modality and the
# depth-specific augmentations differ.
#
# Override any field via CLI, e.g.:
#   python tools/train.py --config configs/rgb.yaml \
#       dataset.splits_path=splits/jacquard_v2.json \
#       trainer.save_dir=outputs/hrnet_w18_rgb_angle
seed: 0

dataset:
  root: /path/to/JacquardV2_Dataset
  splits_path: splits/jacquard_v2.json
  image_size: 384
  input_mode: rgb                         # <-- RGB only (3 channels). The model's
                                          # first conv keeps its full ImageNet weights.
  mask_mode: angle
  num_angle_bins: 18
  length_scale: 0.3333
  use_stereo_depth: false                 # ignored when input_mode=rgb
  num_workers: 2
  pin_memory: true

augmentation:
  enable: true
  hflip_p: 0.5
  vflip_p: 0.5
  rotate_p: 0.8
  rotate_max_deg: 180.0
  scale_p: 0.7
  scale_range: [0.8, 1.2]
  translate_p: 0.5
  translate_max_frac: 0.05
  color_jitter_p: 0.5
  brightness: 0.2
  contrast: 0.2
  saturation: 0.2
  hue: 0.05
  rgb_noise_p: 0.3
  rgb_noise_std: 0.02
  # depth-specific augmentations are no-ops without a depth channel — set p=0
  # to make that explicit and keep logs uncluttered.
  depth_jitter_p: 0.0
  depth_jitter_range: [1.0, 1.0]
  depth_dropout_p: 0.0
  depth_dropout_frac: 0.0
  use_stereo_depth_p: 0.0

model:
  backbone: hrnet_w18
  pretrained: true
  head_channels: 256
  dropout: 0.1

trainer:
  epochs: 80
  batch_size: 2
  accum_steps: 4
  lr: 0.01
  weight_decay: 5.0e-4
  momentum: 0.9
  optimizer: sgd
  scheduler: poly
  poly_power: 0.9
  warmup_epochs: 1.0
  grad_clip: 1.0
  log_interval: 20
  save_dir: outputs/run_rgb
  eval_every: 1
  amp: true
  save_every_epoch: true
  metrics_csv: metrics.csv

loss:
  bce_weight: 1.0
  dice_weight: 1.0
  bce_pos_weight: 5.0
  ce_weight: 1.0
  ignore_background_in_dice: true
  pos_weight: 1.0
  cos_weight: 1.0
  sin_weight: 1.0
  width_weight: 0.1
