# RGB-only variant of configs/multitask.yaml.
#
# Same GG-CNN-style head (pos / cos2t / sin2t / width) as configs/multitask.yaml,
# but trained from 3-channel RGB frames instead of 4-channel RGB-D. Used as the
# RGB ablation half of the Phase 2a head-to-head: configs/multitask.yaml runs
# on A100 (RGB-D), this one runs in parallel on T4 (RGB-only) so we can answer
# "does the depth channel buy anything?" with the same head and loss on both
# sides.
seed: 0

dataset:
  root: /path/to/JacquardV2_Dataset
  splits_path: splits/jacquard_v2.json
  image_size: 384
  input_mode: rgb                         # 3-channel RGB (no depth)
  mask_mode: multitask
  num_angle_bins: 18
  length_scale: 0.3333
  use_stereo_depth: false                 # ignored when input_mode=rgb
  num_workers: 2
  pin_memory: true
  persistent_workers: false
  prefetch_factor: 2

augmentation:
  enable: true
  hflip_p: 0.5
  vflip_p: 0.5
  rotate_p: 0.8
  rotate_max_deg: 180.0
  scale_p: 0.7
  scale_range: [0.8, 1.2]
  translate_p: 0.5
  translate_max_frac: 0.05
  color_jitter_p: 0.5
  brightness: 0.2
  contrast: 0.2
  saturation: 0.2
  hue: 0.05
  rgb_noise_p: 0.3
  rgb_noise_std: 0.02
  # depth-specific augmentations are no-ops without a depth channel.
  depth_jitter_p: 0.0
  depth_jitter_range: [1.0, 1.0]
  depth_dropout_p: 0.0
  depth_dropout_frac: 0.0
  use_stereo_depth_p: 0.0

model:
  backbone: hrnet_w18
  pretrained: true
  head_channels: 256
  dropout: 0.1

trainer:
  epochs: 80
  batch_size: 2
  accum_steps: 4
  lr: 0.01
  weight_decay: 5.0e-4
  momentum: 0.9
  optimizer: sgd
  scheduler: poly
  poly_power: 0.9
  warmup_epochs: 1.0
  grad_clip: 1.0
  log_interval: 20
  save_dir: outputs/multitask_rgb         # isolate from outputs/multitask (RGB-D)
  eval_every: 1
  amp: true
  save_every_epoch: true
  metrics_csv: metrics.csv
  profile_timing: true                    # per-epoch data/compute timing + dataload_fraction in logs and metrics.csv
  profile_gpu: true                       # per-epoch GPU memory (allocated/peak GB) and utilization%

loss:
  bce_weight: 1.0
  dice_weight: 1.0
  bce_pos_weight: 5.0
  ce_weight: 1.0
  ignore_background_in_dice: true
  pos_weight: 1.0
  cos_weight: 1.0
  sin_weight: 1.0
  width_weight: 0.1
